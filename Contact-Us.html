<body>

    <nav>

            <div class="link"><a href="Contact-Us.html">Contact Us</a></div>
        </div>
    </nav>
    <main>
            <section class="section4">
                <form action="" method="post" id="back">
                    <fieldset>
                        <legend><h2>Contact Us</h2></legend>
                        <p>
                            Have questions? <br>
                            Contact us and we’ll respond as soon as possible.
                         </p>
                        <label for="name">Name:</label>
                        <input id="name" type="text" name="name" required placeholder="Enter your name">
                        <br>
                        <label for="email">Email:</label>
                        <input id="email" type="email" required placeholder="Enter your email">
                        <br>
                        <label for="message">Message:</label>
                        <textarea id="message" rows="4"  required placeholder="Enter your message...."></textarea>
                        <br><br>
                        <input id ="send" type="button"  value="Send Message">
                    </fieldset>
                </form>
            </section>
        </main>
