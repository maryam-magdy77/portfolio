<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Personal Course organizer</h1>
    </header>
    <nav>
        <div class="links">
            <div class="link"><a href="index.html">Home</a></div>
            <div class="link"><a href="My-Courses.html">My Courses</a></div>
            <div class="link"><a href="Add-Course.html">Add Course</a></div>
            <div class="link"><a href="Contact-Us.html">Contact Us</a></div>
        </div>
    </nav>
    <main>
            <section class="section3">
                
                <form action="" method="post" id="back">
                    <fieldset>
                        <legend><h2>Add a New Course</h2></legend>
                        <label for="name">Course Name:</label>
                        <input id="name" type="text" required placeholder="Enter course name" >
                        <br>
                        <label for="instructor">Instructor:</label>
                        <input id="instructor" type="text" required placeholder="Enter instructor name">
                        <br>
                        <label for="credit">Credit Hours:</label>
                        <input id="credit" type="number" required placeholder="Enter credit hours">
                        <br>
                        <label for="note">Notes:</label>
                        <textarea id="note" type="" rows="4" cols="21" placeholder="any additional notes....."></textarea>
                        <br><br>
                        <input id ="send" type="button" value="Add Course">
                    </fieldset>
                </form>
            </section>
        </main>
        <footer>
            &copy; designed by maryam magdy 2026 - Personal Course Organize
        </footer>
    </body>
</html>
